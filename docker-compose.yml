services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_graphql
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: fastapi_graphql_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres