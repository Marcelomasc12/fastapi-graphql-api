name: Python CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Subir containers
        run: docker compose up -d --build

      - name: Aguardar banco iniciar
        run: sleep 15

      - name: Rodar testes e validar cobertura dos resolvers GraphQL
        run: docker compose exec -T api pytest --cov=app.graphql_schema --cov-report=term-missing --cov-fail-under=90

      - name: Encerrar containers
        if: always()
        run: docker compose down